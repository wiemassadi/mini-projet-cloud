name: CI/CD – Build et Deploy
 
# Se déclenche à chaque push sur la branche main
on:
  push:
    branches: [ main ]
 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      IMAGE_NAME: flask-todo
 
    steps:
      # Étape 1 : Récupérer le code
      - name: 1. Checkout du code
        uses: actions/checkout@v4

      # Étape 2 : Validation des variables/secrets requis
      - name: 2. Vérifier les credentials Docker Hub
        run: |
          if [ -z "${{ env.DOCKERHUB_USERNAME }}" ]; then
            echo "DOCKERHUB_USERNAME manquant dans les secrets." >&2
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_TOKEN manquant dans les secrets." >&2
            exit 1
          fi

      # Étape 3 : Préparer Buildx
      - name: 3. Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Étape 4 : Se connecter à Docker Hub
      - name: 4. Login Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: false
 
      # Étape 5 : Générer les tags Docker (latest + sha)
      - name: 5. Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # Étape 6 : Build et Push
      - name: 6. Build & Push vers Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ./app1
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Étape 7 : Vérification
      - name: 7. Vérification finale
        run: |
          echo "Pipeline CI/CD terminé avec succès!"
          echo "Image publiée: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
