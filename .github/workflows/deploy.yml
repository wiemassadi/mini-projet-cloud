name: CI/CD – Build et Deploy
 
# Se déclenche à chaque push sur la branche main
on:
  push:
    branches: [ main ]
 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      IMAGE_NAME: flask-todo
 
    steps:
      # Étape 1 : Récupérer le code
      - name: 1. Checkout du code
        uses: actions/checkout@v4

      # Étape 2 : Validation des variables/secrets requis
      - name: 2. Vérifier les credentials Docker Hub
        run: |
          if [ -z "${{ env.DOCKERHUB_USERNAME }}" ]; then
            echo "DOCKERHUB_USERNAME manquant dans les secrets." >&2
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_TOKEN manquant dans les secrets." >&2
            exit 1
          fi

      # Étape 3 : Vérifier explicitement le scope push du token
      - name: 3. Vérifier le scope pull,push du token Docker Hub
        run: |
          SCOPE="repository:${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:pull,push"
          RESPONSE=$(curl -sS -u "${{ env.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" "https://auth.docker.io/token?service=registry.docker.io&scope=${SCOPE}")
          TOKEN=$(python3 -c 'import json,sys; print(json.loads(sys.argv[1]).get("token",""))' "$RESPONSE")
          if [ -z "$TOKEN" ]; then
            echo "Token Docker Hub invalide ou scope insuffisant (read/write requis)." >&2
            echo "Vérifie que le PAT Docker Hub a au minimum Read + Write et accès au namespace ${{ env.DOCKERHUB_USERNAME }}." >&2
            exit 1
          fi

      # Étape 4 : Préparer Buildx
      - name: 4. Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Étape 5 : Se connecter à Docker Hub
      - name: 5. Login Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: false
 
      # Étape 6 : Générer les tags Docker (latest + sha)
      - name: 6. Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # Étape 7 : Build et Push
      - name: 7. Build & Push vers Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ./app1
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Étape 8 : Vérification
      - name: 8. Vérification finale
        run: |
          echo "Pipeline CI/CD terminé avec succès!"
          echo "Image publiée: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
