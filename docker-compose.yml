
 
services:
 
  # ====== BASE DE DONNÉES ======
  db:
    image: postgres:14
    container_name: postgres_db
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # ====== CACHE REDIS ======
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    networks:
      - app-network
 
  # ====== APPLICATION FLASK ======
  app1:
    build: ./app1
    container_name: flask_app1
    environment:
      DATABASE_URL: postgresql://admin:admin@db:5432/tasks
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
  # ====== NGINX (Reverse Proxy) ======
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
    networks:
      - app-network
 
  # ====== MONITORING : Prometheus ======
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - app-network
 
  # ====== MONITORING : Grafana ======
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - app-network
 
  # ====== MONITORING : cAdvisor ======
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - app-network
 
# ====== VOLUMES PERSISTANTS ======
volumes:
  db-data:
  prometheus-data:
  grafana-data:
 
# ====== RÉSEAU INTERNE ======
networks:
  app-network:
    driver: bridge
